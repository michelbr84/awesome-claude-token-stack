name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (node-${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
          run_install: false

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck / build
        run: pnpm run build

      - name: Test
        run: pnpm run test -- --reporter=verbose

      - name: Check formatting
        run: pnpm run format:check

  pack:
    name: package (smoke)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm run build

      - name: acts --version
        run: node packages/cli/dist/bin/acts.js --version

      - name: acts db info (memory store)
        run: |
          mkdir -p tmp
          node packages/cli/dist/bin/acts.js db info --db tmp/smoke.db --json

      - name: acts memory round-trip
        run: |
          node packages/cli/dist/bin/acts.js memory save \
            --kind decision --title "CI smoke" --body "Memory round-trip from CI." \
            --db tmp/smoke.db
          node packages/cli/dist/bin/acts.js memory list --db tmp/smoke.db --json
